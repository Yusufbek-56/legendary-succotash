<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mock Instagram Environment</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .container {
      position: relative;
      width: 400px;
      height: 700px;
      background: #111;
      border-radius: 8px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid #333;
    }

    video {
      width: 400px !important;
      height: 700px !important;
      object-fit: cover !important;
      display: block !important;
      cursor: pointer;
    }

    .label-indicator {
      position: absolute;
      bottom: 20px;
      left: 20px;
      font-size: 18px;
      font-weight: bold;
      background: rgba(0,0,0,0.6);
      padding: 4px 12px;
      border-radius: 4px;
      pointer-events: none;
      z-index: 50;
    }

    /* --- REELS LAYOUT --- */
    .action-bar-mock {
      position: absolute;
      right: 10px;
      bottom: 40px;
      width: 50px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;
      gap: 16px;
      background: transparent;
      z-index: 100;
    }

    .action-bar-mock button {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: none;
      background: rgba(255, 255, 255, 0.1);
      color: white;
      cursor: pointer;
    }

    .reels-mute-container {
      position: absolute;
      top: 20px;
      right: 20px;
      z-index: 100;
    }

    .native-mute-btn {
      background: rgba(0, 0, 0, 0.5);
      border: none;
      border-radius: 50%;
      width: 36px;
      height: 36px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
    }

    /* --- STORIES LAYOUT --- */
    .story-header {
      position: absolute;
      top: 15px;
      left: 15px;
      right: 15px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      z-index: 100;
    }

    .story-user-info {
      font-weight: 600;
      font-size: 14px;
    }

    .story-buttons {
      display: flex;
      gap: 8px;
    }

    .story-btn {
      background: none;
      border: none;
      color: white;
      cursor: pointer;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* --- FEED POST LAYOUT --- */
    .feed-post-overlay {
      position: absolute;
      bottom: 15px;
      right: 15px;
      z-index: 100;
      display: flex;
      align-items: center;
      gap: 8px;
    }
  </style>
</head>
<body>
  <div id="app-root"></div>

  <script>
    window.__IS_MOCK_TEST__ = true;
    const path = window.location.pathname;

    let html = '';

    if (path.includes('/stories/')) {
      // Stories layout
      html = `
        <section class="_as3a container" id="story-container">
          <video src="https://assets.mixkit.co/videos/preview/mixkit-tree-with-yellow-flowers-against-the-sky-42436-large.mp4" loop muted playsinline style="width: 400px !important; height: 700px !important; display: block !important; object-fit: cover !important;"></video>
          <div class="label-indicator">Story Mode</div>
          <div class="story-header">
            <div class="story-user-info">test_user</div>
            <div class="story-buttons">
              <button class="story-btn native-mute-btn" aria-label="Unmute">
                <svg viewBox="0 0 24 24" width="18" height="18">
                  <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z" fill="currentColor"></path>
                </svg>
              </button>
              <button class="story-btn" aria-label="More options">⋯</button>
            </div>
          </div>
          <div class="story-close-overlay" style="position: absolute; top: 15px; right: 55px; z-index: 120; width: 32px; height: 32px;">
            <button class="story-btn close-btn" aria-label="Close" style="background: none; border: none; color: white; cursor: pointer; font-size: 20px;">✕</button>
          </div>
        </section>
      `;
    } else if (path.includes('/p/')) {
      // Feed post layout
      const hasMute = !path.includes('no-mute');
      html = `
        <article class="container" id="feed-container">
          <video src="https://assets.mixkit.co/videos/preview/mixkit-tree-with-yellow-flowers-against-the-sky-42436-large.mp4" loop muted playsinline style="width: 400px !important; height: 700px !important; display: block !important; object-fit: cover !important;"></video>
          <div class="label-indicator">Feed Post Mode ${hasMute ? '' : '(No Mute)'}</div>
          <div class="feed-post-overlay">
            ${hasMute ? `
            <button class="native-mute-btn" aria-label="Unmute">
              <svg viewBox="0 0 24 24" width="18" height="18">
                <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z" fill="currentColor"></path>
              </svg>
            </button>
            ` : ''}
          </div>
        </article>
      `;
    } else {
      // Reels layout (default)
      html = `
        <div class="x17505xr container" id="reel-container">
          <video src="https://assets.mixkit.co/videos/preview/mixkit-tree-with-yellow-flowers-against-the-sky-42436-large.mp4" loop muted playsinline style="width: 400px !important; height: 700px !important; display: block !important; object-fit: cover !important;"></video>
          <div class="label-indicator">Reels Mode</div>
          <div class="reels-mute-container">
            <button class="native-mute-btn" aria-label="Unmute">
              <svg viewBox="0 0 24 24" width="20" height="20">
                <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z" fill="currentColor"></path>
              </svg>
            </button>
          </div>
          <div class="action-bar-mock">
            <button>Like</button>
            <button>Comm</button>
            <button>Share</button>
          </div>
        </div>
      `;
    }

    document.getElementById('app-root').innerHTML = html;

    // Make play, pause, and paused stateful in our mock video elements
    document.querySelectorAll('video').forEach(video => {
      let isPaused = true;
      Object.defineProperty(video, 'paused', {
        get() { return isPaused; },
        set(val) { isPaused = val; },
        configurable: true
      });

      video.play = () => {
        isPaused = false;
        video.dispatchEvent(new Event('play'));
        video.dispatchEvent(new Event('playing'));
        return Promise.resolve();
      };

      video.pause = () => {
        isPaused = true;
        video.dispatchEvent(new Event('pause'));
      };
    });

    // Native mute/unmute visual indicator logic
    const muteBtn = document.querySelector('.native-mute-btn');
    const video = document.querySelector('video');
    if (muteBtn && video) {
      const updateMuteButtonState = () => {
        const isMuted = video.muted;
        muteBtn.setAttribute('aria-label', isMuted ? 'Unmute' : 'Mute');
        muteBtn.querySelector('svg').innerHTML = isMuted 
          ? '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z" fill="currentColor"></path>'
          : '<path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z" fill="currentColor"></path><path d="M14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z" fill="currentColor"></path>';
      };

      muteBtn.addEventListener('click', () => {
        const isCurrentlyMutedLabel = muteBtn.getAttribute('aria-label') === 'Unmute';
        video.muted = !isCurrentlyMutedLabel;
        updateMuteButtonState();
      });

      video.addEventListener('click', () => {
        if (video.paused) {
          video.play().catch(err => console.log('Playback error:', err));
        } else {
          video.pause();
        }
      });
    }
  </script>
</body>
</html>
